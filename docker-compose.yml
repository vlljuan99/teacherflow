# Postgres para desarrollo local.
# Levanta con: `docker compose up -d db`
# Apaga con:   `docker compose down`
# El stack de producción está en deploy/docker-compose.yml.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: teacherflow
      POSTGRES_PASSWORD: teacherflow
      POSTGRES_DB: teacherflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
